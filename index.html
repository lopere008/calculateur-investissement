<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur d'investissement</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Calculateur d'investissement</h1>
  <p class="subtitle">Estimez le rendement d'un placement avec apport initial et versements mensuels</p>

  <form id="form-calcul">
    <div class="field">
      <label for="I">Apport initial (FCFA)</label>
      <input type="number" id="I" value="500000" min="0">
    </div>

    <div class="field">
      <label for="m">Apport mensuel (FCFA)</label>
      <input type="number" id="m" value="25000" min="0">
    </div>

    <div class="field">
      <label for="t">Taux annuel fixe (%)</label>
      <input type="number" id="t" value="8" step="0.1" min="0">
    </div>

    <div class="field">
      <label for="n">Durée (années)</label>
      <input type="number" id="n" value="10" min="1" max="50">
    </div>

    <button type="submit">Calculer le rendement</button>
  </form>

  <div id="resultat" class="resultat"></div>
</div>

<script src="script.js"></script>
</body>
</html>
